<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lojinha do Gesma | Premium Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bege-fundo: #f4f1ec;
      --bege-card: #FDFBF7;
      --verde-escuro: #2f3e2c;
      --verde-suave: #5e7c4a;
      --transicao: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bege-fundo);
      font-family: 'Inter', sans-serif;
      color: var(--verde-escuro);
      overflow-x: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      position: fixed;
      width: 100%;
      z-index: 100;
      transition: var(--transicao);
    }

    header.scrolled {
      background: rgba(244, 241, 236, 0.8);
      backdrop-filter: blur(15px);
      padding: 15px 60px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .logo-container { display: flex; align-items: center; gap: 15px; }
    .logo-img { height: 50px; width: auto; transition: var(--transicao); }
    header.scrolled .logo-img { height: 40px; }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: white;
    }
    header.scrolled h1 { color: var(--verde-escuro); }

    .menu a {
      margin-left: 40px;
      text-decoration: none;
      color: white;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: var(--transicao);
    }
    header.scrolled .menu a { color: var(--verde-escuro); }

    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                  url("images/hacore.jpeg") center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .fogueira-particulas { position: absolute; width: 100%; height: 100%; pointer-events: none; }
    .faisca { position: absolute; bottom: -20px; background: #ffcc33; border-radius: 50%; animation: subir 5s infinite ease-in; }

    @keyframes subir {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      20% { opacity: 0.8; }
      100% { transform: translateY(-100vh) scale(0); opacity: 0; }
    }

    .produtos { padding: 100px 60px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }

    .card {
      background: var(--bege-card);
      border-radius: 15px;
      overflow: hidden;
      transition: var(--transicao);
      border: 1px solid rgba(0,0,0,0.03);
      opacity: 0; transform: translateY(30px);
    }

    .card.active { opacity: 1; transform: translateY(0); }

    .card img { width: 100%; height: 380px; object-fit: contain; padding: 30px; cursor: pointer; }
    .card-content { padding: 30px; text-align: center; }

    button {
      width: 100%; padding: 15px; background: var(--verde-escuro); color: white;
      border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase;
      letter-spacing: 2px; font-weight: 600; transition: var(--transicao);
    }
    button:hover { background: var(--verde-suave); }

    .modal {
      display: none; position: fixed; z-index: 1000; width: 100%; height: 100%;
      background: rgba(47, 62, 44, 0.95); backdrop-filter: blur(10px);
    }
    .modal-content { height: 100%; display: flex; align-items: center; justify-content: center; }
    .modal-img { max-width: 80%; max-height: 80vh; border-radius: 10px; }
    .fechar { position: absolute; top: 30px; right: 50px; color: white; font-size: 50px; cursor: pointer; }
  </style>
</head>
<body>

<header id="main-header">
  <div class="logo-container">
    <img src="images/logogesma.png" alt="Logo" class="logo-img">
    <h1>Lojinha do Gesma</h1>
  </div>
  <nav class="menu">
    <a href="#">Início</a>
    <a href="#">Coleção</a>
    <a href="#">Sobre</a>
  </nav>
</header>

<section class="hero">
  <div class="fogueira-particulas" id="faiscas-container"></div>
  <div class="hero-text">
    <h2>Explorar a Natureza com Estilo</h2>
    <p>Elegância, aventura e identidade.</p>
  </div>
</section>

<section class="produtos">
  <div class="grid" id="produtos-grid"></div>
</section>

<div class="modal" id="modal">
  <span class="fechar">&times;</span>
  <div class="modal-content"><img class="modal-img" id="modal-img"></div>
</div>

<script>
  const produtos = [
    { nome: "Ecobag Brim", preco: "R$ 45,00", imagem: "images/ecobag.png" },
    { nome: "Boné Brim", preco: "R$ 50,00", imagem: "images/bone.png" },
    { nome: "Corta-vento Hacoré", preco: "R$ 120,00", imagem: "images/corta-vento.png" },
    { nome: "Tirante + Borracha", preco: "R$ 15,00", imagem: "images/tirante.png" },
    { nome: "Camisa Edição 2022", preco: "R$ 50,00", imagem: "images/camisa.png" },
    { nome: "Moletom Edição 2022 e Calça Moletom", preco: "R$ 135,00 e R$ 110,00", imagem: "images/moletom.png" }
  ];

  const grid = document.getElementById("produtos-grid");
  const linkFormulario = "https://docs.google.com/forms/d/e/1FAIpQLSfrQ8VbMCznQ-xeTOUJ98aEgieXx0SsGQO8Y7ZaS8zpvCjJeA/viewform";

  produtos.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${p.imagem}" class="produto-img">
      <div class="card-content">
        <h3>${p.nome}</h3>
        <p>${p.preco}</p>
        <button class="btn-comprar">Comprar Agora</button>
      </div>
    `;
    grid.appendChild(card);
  });

  // Evento de clique nos botões de compra
  document.addEventListener("click", e => {
    if (e.target.classList.contains("btn-comprar")) {
      window.open(linkFormulario, "_blank");
    }
  });

  // Efeito de scroll no Header
  window.onscroll = () => {
    const header = document.getElementById('main-header');
    if (window.scrollY > 50) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
    
    // Revelar cards no scroll
    document.querySelectorAll('.card').forEach(card => {
      if (card.getBoundingClientRect().top < window.innerHeight - 100) card.classList.add('active');
    });
  };

  // Faíscas
  const container = document.getElementById('faiscas-container');
  for (let i = 0; i < 30; i++) {
    const f = document.createElement('div');
    f.className = 'faisca';
    f.style.width = f.style.height = Math.random() * 4 + 2 + 'px';
    f.style.left = Math.random() * 100 + '%';
    f.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(f);
  }

  // Modal
  const modal = document.getElementById("modal");
  document.addEventListener("click", e => {
    if (e.target.classList.contains("produto-img")) {
      modal.style.display = "block";
      document.getElementById("modal-img").src = e.target.src;
    }
    if (e.target.classList.contains("fechar") || e.target === modal) modal.style.display = "none";
  });
</script>
</body>
</html>
