<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lojinha do Gesma | Premium Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bege-fundo: #f4f1ec;
      --bege-card: #FDFBF7;
      --verde-escuro: #2f3e2c;
      --verde-suave: #5e7c4a;
      --fogo: #ff6d00;
      --transicao: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: var(--bege-fundo); font-family: 'Inter', sans-serif; color: var(--verde-escuro); overflow-x: hidden; }

    /* HEADER */
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; position: fixed; width: 100%; z-index: 100; transition: var(--transicao); }
    header.scrolled { background: rgba(244, 241, 236, 0.9); backdrop-filter: blur(15px); padding: 12px 5%; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
    .logo-container { display: flex; align-items: center; gap: 12px; }
    .logo-img { height: 45px; transition: var(--transicao); }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: white; }
    header.scrolled h1 { color: var(--verde-escuro); }
    .menu a { margin-left: 25px; text-decoration: none; color: white; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
    header.scrolled .menu a { color: var(--verde-escuro); }

    /* HERO */
    .hero { height: 100vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url("images/hacore.jpeg") center/cover no-repeat; display: flex; justify-content: center; align-items: center; text-align: center; color: white; position: relative; }
    .fogueira-particulas { position: absolute; width: 100%; height: 100%; pointer-events: none; }
    .faisca { position: absolute; bottom: -20px; background: #ffcc33; border-radius: 50%; animation: subir 5s infinite ease-in; }

    @keyframes subir {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      20% { opacity: 0.8; }
      100% { transform: translateY(-100vh) scale(0); opacity: 0; }
    }

    /* ÁREA INTERATIVA DO ACAMPAMENTO */
    .camping-area {
      padding: 60px 0;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 100px;
      background: linear-gradient(to bottom, #f4f1ec, #ece8e1);
      position: relative;
    }

    /* BARRACA */
    .barraca-container {
      width: 150px;
      cursor: pointer;
      transition: transform 0.3s ease;
      animation: balanco Barraca 4s infinite ease-in-out;
    }
    .barraca-container:hover { transform: scale(1.1); }
    
    @keyframes balancoBarraca {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(1deg); }
    }

    /* FOGUEIRA */
    .fogueira-container {
      width: 100px;
      height: 120px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }

    .chama {
      position: absolute;
      bottom: 20px;
      width: 40px;
      height: 40px;
      background: var(--fogo);
      border-radius: 0 50% 50% 50%;
      transform: rotate(-45deg);
      animation: queimar 0.8s infinite alternate;
      filter: blur(2px);
      box-shadow: 0 0 20px var(--fogo);
    }

    .chama.p { width: 25px; height: 25px; background: #ffca28; animation-delay: 0.2s; margin-left: 10px; }

    @keyframes queimar {
      0% { transform: rotate(-45deg) scale(1); opacity: 0.8; }
      100% { transform: rotate(-45deg) scale(1.2); opacity: 1; }
    }

    .lenha {
      width: 60px;
      height: 15px;
      background: #5d4037;
      border-radius: 10px;
      position: absolute;
      bottom: 5px;
    }
    .lenha.d { transform: rotate(20deg); }
    .lenha.e { transform: rotate(-20deg); }

    /* PRODUTOS */
    .produtos { padding: 80px 5%; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
    .card { background: var(--bege-card); border-radius: 12px; overflow: hidden; transition: var(--transicao); border: 1px solid rgba(0,0,0,0.03); display: flex; flex-direction: column; opacity: 0; transform: translateY(30px); }
    .card.active { opacity: 1; transform: translateY(0); }
    .img-container { width: 100%; height: 300px; background: #fdfdfd; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: pointer; transition: transform 0.5s ease; }
    .card-content { padding: 25px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .card h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 12px; min-height: 2.6rem; }
    .card p { color: var(--verde-suave); font-weight: 600; font-size: 1.1rem; margin-bottom: 20px; }
    button { width: 100%; padding: 14px; background: var(--verde-escuro); color: white; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; font-size: 0.75rem; transition: var(--transicao); }

    /* MOBILE */
    @media (max-width: 600px) {
      .camping-area { gap: 40px; padding: 40px 0; }
      header h1 { font-size: 1.1rem; }
      .menu { display: none; }
    }
  </style>
</head>
<body>

<header id="main-header">
  <div class="logo-container">
    <img src="images/logogesma.png" alt="Logo" class="logo-img">
    <h1>Lojinha do Gesma</h1>
  </div>
  <nav class="menu">
    <a href="#">Início</a>
    <a href="#">Coleção</a>
    <a href="#">Sobre</a>
  </nav>
</header>

<section class="hero">
  <div class="fogueira-particulas" id="faiscas-container"></div>
  <div class="hero-text">
    <h2>Explorar a Natureza com Estilo</h2>
    <p>Elegância, aventura e identidade.</p>
  </div>
</section>

<section class="camping-area">
  <div class="barraca-container" title="Balança com o vento!">
    <svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 10L90 70H10L50 10Z" fill="#5e7c4a"/>
      <path d="M50 10L65 70H35L50 10Z" fill="#2f3e2c" opacity="0.3"/>
      <path d="M50 10V70" stroke="#2f3e2c" stroke-width="2"/>
    </svg>
  </div>

  <div class="fogueira-container">
    <div class="lenha e"></div>
    <div class="lenha d"></div>
    <div class="chama"></div>
    <div class="chama p"></div>
  </div>
</section>

<section class="produtos">
  <div class="grid" id="produtos-grid"></div>
</section>

<div class="modal" id="modal">
  <span class="fechar">&times;</span>
  <div class="modal-content"><img class="modal-img" id="modal-img"></div>
</div>

<script>
  const produtos = [
    { nome: "Ecobag Brim", preco: "R$ 45,00", imagem: "images/ecobag.png" },
    { nome: "Boné Brim", preco: "R$ 50,00", imagem: "images/bone.png" },
    { nome: "Corta-vento Hacoré", preco: "R$ 120,00", imagem: "images/corta-vento.png" },
    { nome: "Tirante + Borracha", preco: "R$ 15,00", imagem: "images/tirante.png" },
    { nome: "Camisa Edição 2022", preco: "R$ 50,00", imagem: "images/camisa.png" },
    { nome: "Moletom Edição 2022 e Calça Moletom", preco: "R$ 135,00 e R$ 110,00", imagem: "images/moletom.png" }
  ];

  const grid = document.getElementById("produtos-grid");
  const linkFormulario = "https://docs.google.com/forms/d/e/1FAIpQLSfrQ8VbMCznQ-xeTOUJ98aEgieXx0SsGQO8Y7ZaS8zpvCjJeA/viewform";

  produtos.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="img-container">
        <img src="${p.imagem}" class="produto-img">
      </div>
      <div class="card-content">
        <div>
          <h3>${p.nome}</h3>
          <p>${p.preco}</p>
        </div>
        <button class="btn-comprar">Comprar Agora</button>
      </div>
    `;
    grid.appendChild(card);
  });

  document.addEventListener("click", e => {
    if (e.target.classList.contains("btn-comprar")) {
      window.open(linkFormulario, "_blank");
    }
  });

  window.onscroll = () => {
    const header = document.getElementById('main-header');
    if (window.scrollY > 50) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
    
    document.querySelectorAll('.card').forEach(card => {
      if (card.getBoundingClientRect().top < window.innerHeight - 100) card.classList.add('active');
    });
  };

  // Faíscas do Hero
  const container = document.getElementById('faiscas-container');
  for (let i = 0; i < 30; i++) {
    const f = document.createElement('div');
    f.className = 'faisca';
    f.style.width = f.style.height = Math.random() * 4 + 2 + 'px';
    f.style.left = Math.random() * 100 + '%';
    f.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(f);
  }

  const modal = document.getElementById("modal");
  document.addEventListener("click", e => {
    if (e.target.classList.contains("produto-img")) {
      modal.style.display = "block";
      document.getElementById("modal-img").src = e.target.src;
    }
    if (e.target.classList.contains("fechar") || e.target === modal) modal.style.display = "none";
  });
</script>
</body>
</html>
